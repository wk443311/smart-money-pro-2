<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>বিজ্ঞাপন দেখুন</title>
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center; padding: 20px;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: #333; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    #ad-counter {
      font-size: 1.3rem; font-weight: 700; margin-bottom: 24px;
      padding: 10px 20px; background: rgba(255,255,255,0.95);
      border-radius: 25px; display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); color: #555;
    }
    .ad-container {
      background: #fff; padding: 40px 32px; border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      max-width: 450px; width: 100%; animation: slideUp 0.4s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .ad-container h2 { font-size: 1.8rem; margin-bottom: 16px; color: #2d3748; }
    .ad-container p { color: #718096; margin-bottom: 24px; line-height: 1.5; }
    .btn {
      padding: 14px 28px; margin: 10px 5px; cursor: pointer; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 600;
      transition: all 0.2s; width: 100%; max-width: 300px;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }
    .btn-success { background: linear-gradient(135deg, #28a745, #20c997); color: white; display: none; }
    .hidden { display: none !important; }
    #ad-status { margin-top: 16px; font-weight: 500; min-height: 24px; padding: 8px 12px; border-radius: 8px; }
    .error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    .success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
    .warning-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: 9999; align-items: center; justify-content: center;
      animation: fadeIn 0.3s ease;
    }
    .warning-modal.show { display: flex; }
    .warning-content {
      background: #fff; padding: 32px 24px; border-radius: 16px;
      max-width: 400px; width: 90%; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: slideDown 0.3s ease;
    }
    .warning-icon { font-size: 3rem; margin-bottom: 16px; }
    .warning-title { font-size: 1.3rem; font-weight: 700; color: #c53030; margin-bottom: 12px; }
    .warning-message { color: #4a5568; margin-bottom: 24px; line-height: 1.5; white-space: pre-line; }
    .warning-btn {
      background: linear-gradient(135deg, #4facfe, #00f2fe); color: white;
      border: none; padding: 12px 32px; border-radius: 10px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div id="ad-counter">ads watching 5/3</div>

  <div class="warning-modal" id="warningModal">
    <div class="warning-content">
      <div class="warning-icon">⚠️</div>
      <div class="warning-title">সতর্কতা</div>
      <div class="warning-message" id="warningMessage"></div>
      <button class="warning-btn" onclick="closeWarning()">ঠিক আছে</button>
    </div>
  </div>

  <div class="ad-container" id="ad-wall">
    <h2>🔒 কন্টেন্ট লক করা আছে!</h2>
    <p>এই কন্টেন্ট আনলক করতে নিচের বিজ্ঞাপনটি দেখুন।</p>

    <button class="btn btn-primary" id="watch-ad-btn">🔓 আনলক করতে বিজ্ঞাপন দেখুন</button>
    
    <div id="loading-ad" class="hidden">
      <div style="margin: 20px 0;">
        <div style="width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #4facfe; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
      </div>
      বিজ্ঞাপন লোড হচ্ছে...
    </div>
    
    <button class="btn btn-success" id="unlocked-btn">✅ সফলভাবে আনলক হয়েছে!</button>
    
    <div id="ad-status"></div>
  </div>

  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

  <script>
    const BLOCK_ID = "int-32882";
    const NEXT_PAGE = "https://t.me/get_linkViral_bot/app"; // বা আপনার Telegram Mini App লিংক ৩
    const MIN_WATCH_SEC = 9;
    const AUTO_REDIRECT_SEC = 15;

    const watchAdBtn = document.getElementById('watch-ad-btn');
    const loadingAd = document.getElementById('loading-ad');
    const unlockedBtn = document.getElementById('unlocked-btn');
    const adStatus = document.getElementById('ad-status');
    const warningModal = document.getElementById('warningModal');
    const warningMessage = document.getElementById('warningMessage');

    let adWatched = false;
    let AdController = null;
    let adStartTime = null;
    let autoRedirectTimer = null;

    function triggerAdWarning(message) {
      adStatus.textContent = message;
      adStatus.className = 'error';
      warningMessage.textContent = message;
      warningModal.classList.add('show');
    }

    function closeWarning() { warningModal.classList.remove('show'); }
    warningModal.addEventListener('click', (e) => { if (e.target === warningModal) closeWarning(); });

    function showAdsGramAd() {
      if (adWatched) return;
      try { AdController = window.Adsgram.init({ blockId: BLOCK_ID }); }
      catch (initError) { triggerAdWarning("AdsGram লোড হয়নি। দয়া করে Ad Blocker বন্ধ করুন।"); return; }

      watchAdBtn.classList.add('hidden');
      loadingAd.classList.remove('hidden');
      adStatus.textContent = ''; adStatus.className = '';
      adStartTime = Date.now();

      autoRedirectTimer = setTimeout(() => {
        if (!adWatched) {
          adWatched = true;
          adStatus.textContent = "⏱️ সময় শেষ! পরবর্তী পেজে যাচ্ছে...";
          adStatus.className = 'success';
          setTimeout(() => { window.location.href = NEXT_PAGE; }, 500);
        }
      }, AUTO_REDIRECT_SEC * 1000);

      AdController.show()
        .then((result) => {
          clearTimeout(autoRedirectTimer);
          const watchDuration = (Date.now() - adStartTime) / 1000;
          if (watchDuration < MIN_WATCH_SEC) {
            loadingAd.classList.add('hidden');
            watchAdBtn.classList.remove('hidden');
            triggerAdWarning(`⚠️ বিজ্ঞাপন খুব তাড়াতাড়ি বন্ধ করা হয়েছে!\nঅনুগ্রহ করে অন্তত ${MIN_WATCH_SEC} সেকেন্ড দেখুন।`);
            adStartTime = null; return;
          }
          loadingAd.classList.add('hidden');
          adWatched = true;
          adStatus.textContent = "✅ বিজ্ঞাপন সম্পন্ন! পরবর্তী পেজে যাচ্ছে...";
          adStatus.className = 'success';
          setTimeout(() => { window.location.href = NEXT_PAGE; }, 800);
        })
        .catch((error) => {
          clearTimeout(autoRedirectTimer);
          loadingAd.classList.add('hidden');
          watchAdBtn.classList.remove('hidden');
          const errorMsg = error?.message || "কোনো বিজ্ঞাপন পাওয়া যায়নি বা লোড হয়নি";
          triggerAdWarning(errorMsg);
          adStartTime = null;
        });
    }

    watchAdBtn.addEventListener('click', showAdsGramAd);
    window.addEventListener('load', () => {
      if (typeof window.Adsgram === 'undefined') {
        triggerAdWarning("AdsGram SDK লোড হয়নি। দয়া করে Ad Blocker বন্ধ করুন।");
      }
    });
  </script>

</body>
</html>
